name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: abkit
          POSTGRES_PASSWORD: abkit
          POSTGRES_DB: abkit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U abkit -d abkit"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # conftest.py (корень репозитория): если задан TEST_DATABASE_URL, тесты
      # используют его вместо поднятия своего Postgres через testcontainers
      # (см. DOCKER.md §12: "testcontainers-postgres (или docker-compose для CI)").
      # Общий и для tests/, и для backend/tests/ (FRONTEND.md R1+).
      TEST_DATABASE_URL: postgresql+psycopg://abkit:abkit@localhost:5432/abkit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Установить зависимости
        run: pip install -e ".[dev]"

      - name: Lint (pyflakes)
        run: python -m pyflakes abkit backend tests migrations app.py cli.py cli_admin.py conftest.py

      - name: Тесты
        run: python -m pytest -q

  persistence-test:
    # Опциональная джоба: docker/test_persistence.sh реально поднимает
    # docker compose (build + up/down/force-recreate), это медленно и не
    # нужно на каждый push/PR — запускается только вручную (Actions ->
    # CI -> Run workflow), например перед релизом или после правок
    # docker-compose.yml/entrypoint.sh/схемы БД. См. docker/README.md,
    # раздел "Данные и перезапуски".
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Сгенерировать .env для docker compose
        run: |
          cat > .env <<EOF
          ABKIT_SECRET_KEY=$(openssl rand -hex 32)
          POSTGRES_PASSWORD=$(openssl rand -hex 16)
          EOF

      - name: docker/test_persistence.sh
        run: bash docker/test_persistence.sh

      - name: Логи контейнеров (при падении)
        if: failure()
        run: docker compose logs

      - name: docker compose down -v (уборка раннера)
        if: always()
        run: docker compose down -v

  build-and-push:
    # Только на push тега вида v* (например v1.4.0) — DOCKER.md §12/§7.1.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Версия из тега (v1.4.0 -> 1.4.0)
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          build-args: |
            ABKIT_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
